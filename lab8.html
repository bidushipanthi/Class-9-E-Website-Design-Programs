<!DOCTYPE html>
<html>
<head>
	<title>Colspan and Rowspan</title>
</head>
<body>
<table border="1">
	<tr>
		<td rowspan="2">1</td>
		<td colspan="2">2</td>
		<td colspan="2">3</td>
	</tr>
	<tr>
		<td rowspan="2">4</td>
		<td colspan="3">5</td>
	</tr>
	<tr>
		<td rowspan="2">6</td>
		<td rowspan="2">7</td>
		<td colspan="2">8</td>
	</tr>
	<tr>
		<td>9</td>
		<td>10</td>
		<td>11</td>
	</tr>
</table>
</body>
</html>
