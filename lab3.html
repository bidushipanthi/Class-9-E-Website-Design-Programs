<!DOCTYPE html>
<html>
<head>
	<title>Text Formatting in HTML</title>
</head>
<body>
	This is the default.
	<br>
	<b>This is in bold.</b>
	<br>
	<i>This is in italics.</i>
	<br>
	<u>This is underlined.</u>
	<br>
	H<sub>2</sub>O includes a subscript.
	<br>
	a<sup>2</sup>+b<sup>2</sup> includes a superscript.
	<br>
	<del>This is crossed out.</del>
</body>
</html>
