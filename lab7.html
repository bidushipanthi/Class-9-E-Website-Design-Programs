<!DOCTYPE html>
<html>
<head>
	<title>Use of Rowspan</title>
</head>
<body>
<table border="1">
	<tr>
	<td rowspan="3">1</td>
	<td>2</td><td>3</td>
	</tr>
	<tr><td>4</td><td>5</td></tr>
	<tr><td>6</td><td>8</td></tr>
	<tr><td>9</td><td>10</td><td>11</td></tr>
</table>

<table border="1">
	<tr>
		<td rowspan="2">1</td>
		<td>2</td>
		<td>3</td>
		<td>4</td>
	</tr>
	<tr>
		<td rowspan="2">5</td>
		<td>6</td>
		<td>7</td>
	</tr>
	<tr>
		<td rowspan="2">8</td>
		<td>9</td>
		<td rowspan="2">10</td>
	</tr>
	<tr>
		<td>11</td>
		<td>12</td>
	</tr>
</table>
</body>
</html>
